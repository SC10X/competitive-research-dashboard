# Render Blueprint — 一键部署前后端
# https://render.com/docs/blueprint-spec

services:
  # ── 后端 API (FastAPI + SQLite) ──
  - type: web
    name: competitive-research-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python startup.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///backend/data/competitive_research.db

  # ── 前端 (React SPA) ──
  - type: static
    name: competitive-research-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://competitive-research-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
